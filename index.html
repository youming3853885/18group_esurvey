<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta property="og:title" content="我是稀有度 SSR 的怪物！快來測測你的職群原動力！">
    <meta property="og:description" content="全台僅 5% 的人擁有此特質！探索你的潛在天賦。">
    <meta property="og:image" content="https://example.com/share-image.jpg">
    <title>職群怪物圖鑑｜你內心的是哪一隻怪物？</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <script>
        /**
         * In-App Browser Breakout (Jailbreak)
         * Forces opening in the default browser for LINE/FB/Messenger to ensure better UX and sharing functionality.
         */
        (function() {
            var ua = navigator.userAgent || navigator.vendor || window.opera;
            var isLine = ua.indexOf("Line") > -1;
            var isFB = (ua.indexOf("FBAN") > -1) || (ua.indexOf("FBAV") > -1);
            var isMessenger = ua.indexOf("Messenger") > -1;
            var isInstagram = ua.indexOf("Instagram") > -1;

            if (isLine || isFB || isMessenger || isInstagram) {
                // 1. LINE Specific Breakout
                if (isLine && window.location.href.indexOf('openExternalBrowser=1') === -1) {
                    var url = window.location.href;
                    var sep = url.indexOf('?') > -1 ? '&' : '?';
                    window.location.href = url + sep + 'openExternalBrowser=1';
                    return;
                }

                // 2. Android Universal Breakout (Forces Chrome/Default Browser)
                if (/Android/i.test(ua)) {
                    var url = window.location.href.replace(/^https?:\/\//, "");
                    // Using intent scheme to trigger external browser
                    window.location.href = "intent://" + url + "#Intent;scheme=https;package=com.android.chrome;end";
                }
                
                // 3. iOS FB/Messenger/IG: Cannot force breakout automatically, 
                // but we can prompt the user later if needed. 
                // For now, the openExternalBrowser=1 trick handles LINE on iOS.
            }
        })();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* ── Reset & Constants ── */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        body {
            background: #000;
            color: #e2e8f0;
            font-family: 'Noto Sans TC', sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .main-bg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .main-bg img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        button {
            outline: none;
            border: none;
            background: transparent;
            font-family: inherit;
        }

        /* ── Container (Mobile First, no scroll) ── */
        .app-container {
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            max-width: 480px;
            margin: 0 auto;
            background: transparent;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 100px rgba(0,0,0,0.5);
        }

        /* ── Screen Management ── */
        .screen {
            position: absolute;
            inset: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            height: 100%;
            animation: fadeIn 0.4s ease;
            background: transparent;
            z-index: 10;
        }

        .screen.active {
            display: flex;
        }

        .screen-overlay {
            background: transparent !important;
        }

        #screen-loading {
            justify-content: center;
            color: #fff;
            font-size: 1.5rem;
            font-weight: 900;
            background: #050508;
            z-index: 1000;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 255, 255, 0.2);
            border-top: 5px solid #a855f7;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }

        .fade-in { animation: fadeIn 0.8s ease forwards; }
        .fade-out { animation: fadeOut 0.8s ease forwards; }

        /* ── Home Screen (Layered) ── */
        #screen-home {
            justify-content: center;
            background: transparent;
            cursor: pointer;
        }

        .book-layer {
            width: 100%;
            height: 100%;
            object-fit: contain;
            position: absolute;
            inset: 0;
            z-index: 5;
            transition: opacity 0.8s ease;
        }

        .arrow-pointer {
            position: absolute;
            width: 50px;
            height: 50px;
            bottom: 18%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            pointer-events: none;
            animation: arrowFloat 1.5s infinite ease-in-out;
            filter: drop-shadow(0 0 15px #a855f7);
            color: #d8b4fe;
        }

        @keyframes arrowFloat {
            0% { transform: translateX(-50%) translateY(0); opacity: 0.8; }
            50% { transform: translateX(-50%) translateY(-15px); opacity: 1; }
            100% { transform: translateX(-50%) translateY(0); opacity: 0.8; }
        }

        /* ── Core Game Header ── */
        .header {
            width: 100%;
            padding: 1rem 1.5rem;
            z-index: 20;
            position: absolute;
            top: 0;
        }

        .progress-wrap {
            position: relative;
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff0080, #7928ca);
            width: 0%;
            transition: width 0.3s ease;
            box-shadow: 0 0 15px rgba(255, 0, 128, 0.5);
        }

        .progress-text {
            text-align: right;
            font-size: 0.8rem;
            color: #fff;
            margin-top: 0.5rem;
            font-weight: 700;
            text-shadow: 0 0 5px #000;
            letter-spacing: 1px;
        }

        /* ── Egg Area ── */
        .egg-area {
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            min-height: 120px;
            padding: 1rem 0;
        }

        .egg-container {
            position: relative;
            width: 50%;
            max-width: 240px;
            aspect-ratio: 1/1;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 10%;
            transition: opacity 0.8s ease;
            opacity: 0;
        }

        .egg-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 0 20px rgba(168, 85, 247, 0.4));
            transition: filter 0.3s, transform 0.1s;
            pointer-events: none;
        }

        .egg-svg-cracks {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .egg-svg-cracks path {
            fill: none;
            stroke: #1a1a1a;
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
            filter: drop-shadow(0 0 4px #000000);
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            transition: stroke-dashoffset 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Shake Animation */
        .shake {
            animation: shakeAnim 0.3s cubic-bezier(.36, .07, .19, .97) both;
        }

        @keyframes shakeAnim {

            10%,
            90% {
                transform: translate3d(-2px, 2px, 0) rotate(1deg);
            }

            20%,
            80% {
                transform: translate3d(2px, -3px, 0) rotate(-1deg);
            }

            30%,
            50%,
            70% {
                transform: translate3d(-4px, 4px, 0) rotate(2deg);
                filter: brightness(1.2) drop-shadow(0 0 40px rgba(168, 85, 247, 0.8));
            }

            40%,
            60% {
                transform: translate3d(4px, -4px, 0) rotate(-2deg);
            }
        }

        /* Particles */
        .debris {
            position: absolute;
            width: 6px;
            height: 6px;
            background: #a855f7;
            border-radius: 50%;
            pointer-events: none;
            z-index: 50;
            box-shadow: 0 0 10px #d8b4fe, 0 0 20px #a855f7;
        }

        /* ── Panel / Question Area ── */
        .panel {
            background: rgba(0, 0, 0, 0.7);
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
            padding: 1.5rem;
            padding-bottom: env(safe-area-inset-bottom, 1.5rem);
            display: flex;
            flex-direction: column;
            min-height: 48vh;
            backdrop-filter: blur(15px);
            border-top: 2px solid rgba(168, 85, 247, 0.3);
            margin-top: auto;
            width: 100%;
            z-index: 15;
        }

        .q-title {
            font-size: 1.15rem;
            font-weight: 900;
            margin-bottom: 0.3rem;
            color: #fff;
            line-height: 1.4;
        }

        .q-desc {
            font-size: 1.05rem;
            color: #a1a1aa;
            margin-bottom: 1rem;
            line-height: 1.4;
        }

        .q-opts {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            overflow-y: auto;
            overflow-x: hidden;
            flex: 1;
        }

        .q-opts.grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-auto-rows: min-content;
        }

        .opt-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.1);
            color: #e2e8f0;
            border-radius: 12px;
            padding: 1rem;
            font-size: 0.95rem;
            font-weight: 700;
            text-align: center;
            justify-content: center;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s;
            line-height: 1.3;
            flex-wrap: wrap;
            min-height: 3.5rem;
        }

        .opt-btn:active {
            transform: scale(0.97);
            background: rgba(255, 255, 255, 0.15);
        }

        .opt-btn.sel {
            border-color: #a855f7;
            background: rgba(168, 85, 247, 0.15);
        }

        .opt-btn.sel-best {
            border-color: #34d399;
            background: rgba(52, 211, 153, 0.15);
        }

        .opt-btn.sel-worst {
            border-color: #f87171;
            background: rgba(248, 113, 113, 0.15);
        }

        .opt-btn.disabled {
            opacity: 0.4;
            pointer-events: none;
        }

        .opt-btn.scenario-opt {
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .scenario-badge {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2px solid #52525b;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 900;
            color: #52525b;
            flex-shrink: 0;
        }

        .opt-btn.sel-best .scenario-badge {
            border-color: #34d399;
            background: #34d399;
            color: #000;
        }

        .opt-btn.sel-worst .scenario-badge {
            border-color: #f87171;
            background: #f87171;
            color: #000;
        }

        /* ── Result Screen ── */
        #screen-result {
            background: #000;
            justify-content: flex-start;
            padding-bottom: 3rem;
            overflow-y: auto;
        }

        .monster-img-wrap {
            width: 100%;
            padding: 1.5rem;
            display: flex;
            justify-content: center;
            position: relative;
        }

        .monster-img {
            width: 100%;
            max-width: 320px;
            height: auto;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(168, 85, 247, 0.4);
        }

        .result-ui {
            position: relative;
            display: flex;
            flex-direction: column;
            padding: 0 1.5rem;
            width: 100%;
        }

        /* A1: Curiosity Gap */
        .curiosity-gap {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
            margin-bottom: 1.5rem;
            position: relative;
            overflow: hidden;
        }

        .curiosity-gap h3 {
            font-size: 1.1rem;
            color: #c084fc;
            margin-bottom: 0.5rem;
        }

        .curiosity-gap p.teaser {
            font-size: 0.95rem;
            color: #e2e8f0;
        }

        .curiosity-gap p.blurred {
            filter: blur(5px);
            user-select: none;
            color: #a1a1aa;
            margin-top: 0.5rem;
        }

        .unlock-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 1rem;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.9) 20%, transparent 100%);
        }

        .btn-unlock-small {
            background: #a855f7;
            color: white;
            border: none;
            border-radius: 20px;
            padding: 0.4rem 1rem;
            font-size: 0.85rem;
            font-weight: bold;
            cursor: pointer;
        }

        /* A3: Top 3 Thumbnails */
        .top3-container {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-bottom: 1.5rem;
        }

        .thumbnail-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .thumbnail-wrap:hover {
            transform: translateY(-5px);
        }

        .thumbnail-img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 2px solid #a855f7;
            object-fit: cover;
            margin-bottom: 0.4rem;
            background: #000;
        }

        .thumbnail-label {
            font-size: 0.75rem;
            color: #a1a1aa;
            font-weight: bold;
        }

        /* Full Card Popup */
        .card-popup {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 200;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .card-popup.active {
            display: flex;
            opacity: 1;
        }

        .card-popup-content {
            position: relative;
            transform: scale(0.8) rotateY(90deg);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card-popup.active .card-popup-content {
            transform: scale(1) rotateY(0deg);
        }

        .card-popup img {
            width: 80vw;
            max-width: 320px;
            border-radius: 16px;
            box-shadow: 0 0 30px rgba(168, 85, 247, 0.6);
        }

        .close-popup {
            position: absolute;
            top: -15px;
            right: -15px;
            background: #fff;
            color: #000;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            font-weight: bold;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
        }

        .result-actions {
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin-bottom: env(safe-area-inset-bottom, 1rem);
        }

        .btn-share,
        .btn-email,
        .btn-line,
        .btn-google {
            width: 100%;
            padding: 1.1rem;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 900;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-share {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: white;
        }

        .btn-email {
            background: linear-gradient(135deg, #a855f7, #6b21a8);
            color: white;
            border: none;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.5);
        }

        .btn-ig {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            color: #fff;
            border: none;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-weight: 900;
            font-size: 0.95rem;
            width: 100%;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            padding: 1rem 0.5rem;
            transition: transform 0.2s;
        }

        .btn-ig:active, .btn-fb:active {
            transform: scale(0.95);
        }

        .btn-fb {
            background: #1877F2;
            color: #fff;
            border: none;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-weight: 900;
            font-size: 0.95rem;
            width: 100%;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            padding: 1rem 0.5rem;
            transition: transform 0.2s;
        }

        .share-actions {
            display: flex;
            flex-direction: row;
            gap: 0.8rem;
            width: 100%;
        }

        .share-actions button {
            flex: 1;
        }


        .btn-line {
            background: #06C755;
            color: white;
            border: none;
        }

        .btn-google {
            background: #fff;
            color: #333;
            border: 1px solid #ddd;
        }

        .btn-share:active,
        .btn-email:active,
        .btn-line:active,
        .btn-google:active {
            transform: scale(0.97);
        }

        /* B1: Hidden IG Story Template */
        #ig-template {
            position: fixed;
            top: -9999px;
            left: -9999px;
            width: 1080px;
            height: 1920px;
            background: #050508;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 100px;
            font-family: 'Noto Sans TC', sans-serif;
            text-align: center;
        }

        .ig-title {
            font-size: 70px;
            font-weight: 900;
            margin-bottom: 20px;
            color: #c084fc;
        }

        .ig-rarity {
            font-size: 40px;
            color: #f59e0b;
            margin-bottom: 80px;
            font-weight: bold;
        }

        .ig-img {
            width: 800px;
            height: 800px;
            object-fit: contain;
            border-radius: 40px;
            box-shadow: 0 0 100px rgba(168, 85, 247, 0.5);
            margin-bottom: 80px;
        }

        .ig-desc {
            font-size: 50px;
            font-weight: bold;
            color: #e2e8f0;
            margin-bottom: 60px;
            line-height: 1.5;
        }

        .ig-sticker-space {
            width: 600px;
            height: 200px;
            border: 2px dashed rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 40px;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: none;
            align-items: flex-end;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: #1c1c1e;
            width: 100%;
            max-width: 480px; /* Constrain to app width */
            padding: 2.5rem 1.5rem;
            border-top-left-radius: 28px;
            border-top-right-radius: 28px;
            padding-bottom: max(3rem, env(safe-area-inset-bottom));
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }

        .modal-title {
            font-size: 1.25rem;
            font-weight: 900;
            margin-bottom: 0.6rem;
            color: #fff;
            text-align: left;
        }

        .modal-desc {
            font-size: 0.85rem;
            color: #a1a1aa;
            margin-bottom: 1.5rem;
            line-height: 1.5;
        }

        .login-options {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin-bottom: 1rem;
        }

        .divider {
            text-align: center;
            color: #71717a;
            font-size: 0.8rem;
            margin: 1rem 0;
            position: relative;
        }

        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: #3f3f46;
        }

        .divider::before {
            left: 0;
        }

        .divider::after {
            right: 0;
        }

        .email-input {
            width: 100%;
            background: #2c2c2e;
            border: 1px solid #3a3a3c;
            border-radius: 12px;
            padding: 1.2rem;
            color: #fff;
            font-size: 1rem;
            outline: none;
            margin-bottom: 1.5rem;
            font-family: inherit;
            transition: all 0.2s;
        }

        .email-input:focus {
            border-color: #a855f7;
            background: #3a3a3c;
        }

        .btn-email {
            width: 100%;
            padding: 1.2rem;
            background: #a855f7;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 900;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.2s;
        }

        .btn-email:active {
            transform: scale(0.98);
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-50px);
            background: #fff;
            color: #000;
            padding: 0.8rem 1.5rem;
            border-radius: 50px;
            font-weight: 800;
            font-size: 0.9rem;
            z-index: 1000;

            try {
                initAudio();
                if (!ac) return;
                const o = ac.createOscillator(), g = ac.createGain();
                o.type = 'square'; g.connect(ac.destination); o.connect(g);
                o.frequency.setValueAtTime(300, ac.currentTime);
                o.frequency.exponentialRampToValueAtTime(80, ac.currentTime + 0.1);
                g.gain.setValueAtTime(0.6, ac.currentTime);

                o.start(); o.stop(ac.currentTime + 0.1);
            } catch (e) { }
        }
        function sfxCrack() {
            try {
                initAudio();
                if (!ac) return;
                // High-frequency "crunch" sound using filtered noise
                const g = ac.createGain();
                g.connect(ac.destination);

                for (let i = 0; i < 3; i++) {
                    const delay = i * 0.03;
                    const duration = 0.05 + Math.random() * 0.05;
                    const n = ac.sampleRate * duration;
                    const b = ac.createBuffer(1, n, ac.sampleRate);
                    const d = b.getChannelData(0);
                    for (let j = 0; j < n; j++) d[j] = (Math.random() * 2 - 1);

                    const s = ac.createBufferSource();
                    s.buffer = b;
                    const f = ac.createBiquadFilter();
                    f.type = 'highpass';
                    f.frequency.value = 3000 + Math.random() * 2000;

                    const ig = ac.createGain();
                    ig.gain.setValueAtTime(0.4, ac.currentTime + delay);
                    ig.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + delay + duration);

                    s.connect(f);
                    f.connect(ig);
                    ig.connect(g);
                    s.start(ac.currentTime + delay);
                }
            } catch (e) { }
        }
        function sfxReveal() {
            try {
                if (!ac) return;
                const o = ac.createOscillator(), g = ac.createGain();
                o.type = 'sine'; o.connect(g); g.connect(ac.destination);
                o.frequency.setValueAtTime(300, ac.currentTime);
                o.frequency.exponentialRampToValueAtTime(1500, ac.currentTime + 1.2);
                g.gain.setValueAtTime(0.5, ac.currentTime);
                g.gain.exponentialRampToValueAtTime(0.01, ac.currentTime + 1.5);
                o.start(); o.stop(ac.currentTime + 1.5);
            } catch (e) { }
        }


        /* ─── VISUAL FX ─── */
        function spawnParticles(amount) {
            const egg = document.getElementById('eggContainer');
            if (!egg) return;
            const rect = egg.getBoundingClientRect();
            // Center of the egg relative to viewport
            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2;

            for (let i = 0; i < amount; i++) {
                const p = document.createElement('div');
                p.className = 'debris';
                // Start position
                p.style.left = cx + 'px';
                p.style.top = cy + 'px';
                document.body.appendChild(p);

                // Random size for variety
                const size = 3 + Math.random() * 5;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                
                // Initial velocities
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 10 + 6;
                let vx = Math.cos(angle) * speed;
                let vy = Math.sin(angle) * speed - 10; // Stronger pop
                let x = cx;
                let y = cy;
                const gravity = 0.3;
                let life = 1.0;
                const decay = 0.008 + Math.random() * 0.01; // Slower decay for longer life

                const animate = () => {
                    x += vx;
                    y += vy;
                    vy += gravity;
                    // Slower decay so they reach the bottom
                    life -= (decay * 0.7);

                    const twinkle = 0.7 + Math.random() * 0.3;
                    // Ensure scale doesn't go negative
                    const currentScale = Math.max(0.2, life);
                    p.style.transform = `translate(${x - cx}px, ${y - cy}px) scale(${currentScale})`;
                    p.style.opacity = Math.max(0, life * twinkle);
                    
                    if (life > 0.7) {
                        p.style.boxShadow = `0 0 ${15 * life}px #fff, 0 0 ${25 * life}px #a855f7`;
                    }

                    // Remove only when off-screen at bottom or life is completely gone
                    if (y < window.innerHeight + 100 && life > -0.1) {
                        requestAnimationFrame(animate);
                    } else {
                        p.remove();
                    }
                };
                requestAnimationFrame(animate);
            }
        }
        function shakeEgg() {

        function buildEggCracks() {
            const svg = document.getElementById('eggCracks');

                let x = 100, y = 100;
                const angle = (i / 15) * Math.PI * 2;
                let d = `M ${x} ${y}`;
                let len = 0;
                while (len < 80) {
                    const step = 8 + Math.random() * 15;
                    x += Math.cos(angle + (Math.random() - 0.5) * 0.8) * step;
                    y += Math.sin(angle + (Math.random() - 0.5) * 0.8) * step;
                    d += ` L ${x} ${y}`;
                    len += step;
                }
                const p = document.createElementNS("http://www.w3.org/2000/svg", "path");
                p.setAttribute('d', d);
                // Random stroke length for each crack
                const dash = 50 + Math.random() * 50;
                p.setAttribute('stroke-dasharray', dash);
                p.setAttribute('stroke-dashoffset', dash);
                p.style.opacity = 0.8;
                svg.appendChild(p);
            }
        }
        function updateEggCracksVisual(pct) {
            const svg = document.getElementById('eggCracks');

            const visibleCount = Math.floor((pct / 100) * paths.length);
            paths.forEach((p, i) => {
                if (i < visibleCount) {

            });
        }

                } else {
                    btn.textContent = opt.t;
                    btn.onclick = () => handleSingleClick(q, opt.v, btn);
                }
                box.appendChild(btn);
            });
        }

        // Handler: Single Choice (Grade, Clarity, Values2, Abilities)
        function handleSingleClick(q, val, btn) {
            btn.classList.add('sel');
            processHit();

            // Save state
            spawnParticles(15); // Splash purple particles on answer
            if (q.type === 'ability') S.abilities[q.ab.id] = val;
            else S.answers[q.key] = val;

            // Advance
            setTimeout(() => { S.qIdx++; renderQuestion(); }, 200);
        }

        // Handler: Multi Choice (Values Q1)
        function handleMultiClick(q, opt, btn, box) {
            const max = q.max;
            if (btn.classList.contains('sel')) {
                // Deselect
                btn.classList.remove('sel');
                S.curMultiSelection = S.curMultiSelection.filter(v => v !== opt.v);
                sfxHit();
            } else {
                if (S.curMultiSelection.length >= max) return; // limit reached
                btn.classList.add('sel');
                S.curMultiSelection.push(opt.v);
                processHit();

                if (S.curMultiSelection.length === max) {
                    // Save and advance
                    S.answers[q.key] = [...S.curMultiSelection];
                    // Disable other buttons instantly
                    Array.from(box.children).forEach(b => { if (!b.classList.contains('sel')) b.classList.add('disabled'); });
                    setTimeout(() => { S.qIdx++; renderQuestion(); }, 350);
                }
            }
        }

        // Handler: Scenario (Best/Worst sequence)
        function handleScenarioClick(q, opt, btn, box) {
            if (S.curScenarioBest === null) {
                // 1st click = BEST
                S.curScenarioBest = opt.oIdx;
                btn.classList.add('sel-best');
                btn.querySelector('.scenario-badge').textContent = '👍';
                document.getElementById('qDesc').innerHTML = '🎯 已選擇最想做。 <br><span style="color:#f87171">👇 現在請選擇1個「絕對不想做」的地雷</span>';
                sfxHit(); // Only hit sound for first selection
            } else {
                // 2nd click = WORST
                if (opt.oIdx === S.curScenarioBest) {
                    // Undoing best
                    S.curScenarioBest = null;
                    btn.classList.remove('sel-best');
                    btn.querySelector('.scenario-badge').textContent = '?';
                    document.getElementById('qDesc').innerHTML = q.desc.replace('\n', '<br>');
                    sfxHit();
                    return;
                }

                btn.classList.add('sel-worst');
                btn.querySelector('.scenario-badge').textContent = '👎';
                processHit();

                // Save and advance
                S.scenariosBest[q.qNum] = S.curScenarioBest;
                S.scenariosWorst[q.qNum] = opt.oIdx;

                Array.from(box.children).forEach(b => { if (!b.classList.contains('sel-best') && !b.classList.contains('sel-worst')) b.classList.add('disabled'); });

                setTimeout(() => { S.qIdx++; renderQuestion(); }, 350);
            }
        }

                // Scenarios mapped to Interest

                    const qNum = idx + 1;
                    const b = S.scenariosBest[qNum];
                    const w = S.scenariosWorst[qNum];
                    sc.o.forEach((opt, oi) => {
                        if (oi === b) interest[opt.g] += 5;
                        else if (oi === w) interest[opt.g] -= 5;
                        else interest[opt.g] += 1;
                    });
                });

                // Abilities

                    const val = S.abilities[ab.id];

                const loadingScreen = document.getElementById('screen-loading');
                if (loadingScreen && loadingScreen.classList.contains('active')) {
                    loadingScreen.classList.remove('active');
                    document.getElementById('screen-home').classList.add('active');
                }
            }, 8000);
        });

        function submitEmail() {
            const em = document.getElementById('emailInput').value.trim();
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!em || !emailRegex.test(em)) {
                showToast('⚠️ 請輸入有效的 Email 格式 (例如: yourname@gmail.com)');
                return;
            }
            const btn = document.getElementById('btnSendEmail');
            btn.textContent = '寄送中...';
            btn.style.opacity = 0.5;

            // Reveal Detailed Analysis immediately for UX
            document.getElementById('emailModal').classList.remove('active');
            const teaser = document.getElementById('gapTeaser');
            if(teaser) teaser.style.display = 'none';
            const detail = document.getElementById('detailedAnalysisContainer');
            if(detail) {
                detail.style.display = 'block';
                detail.style.animation = 'fadeIn 0.5s ease';
            }

            // 1. --- 送到 Supabase 紀錄資料庫 ---
            const SUPABASE_URL = "https://wbvijcrweoljcuksynyp.supabase.co"; 
            const SUPABASE_KEY = "sb_publishable_FhtabuaPzPE8RTOKmHx9TA_XxTc9Dtd";
            const TABLE_NAME = "leads"; 
            const supabasePayload = {
                "資料來源": "18group_monster",
                "年級": S.answers['grade'] || "未填寫",
                "EMAIL": em
            };
            fetch(`${SUPABASE_URL}/rest/v1/${TABLE_NAME}`, {
                method: "POST",
                headers: {
                    "apikey": SUPABASE_KEY,
                    "Authorization": `Bearer ${SUPABASE_KEY}`,
                    "Content-Type": "application/json",
                    "Prefer": "return=minimal"
                },
                body: JSON.stringify(supabasePayload)
            });

            // 2. --- 送到 Google Apps Script 觸發寄送完整報告 ---
            const GOOGLE_APP_URL = "https://script.google.com/macros/s/AKfycbwsRmsgDcAfzIXNPoGUIFrq9FbSfhSj6-iQUbkFMCluCV_5CNRizNxi3Mbm2BAEp5je/exec";
            const reportPayload = {
                "email": em,
                "grade": S.answers['grade'] || "未填寫",
                "clarity": S.answers['clarity'] || "未填寫",
                "topGroup": window._topName,
                "riasec": window._riasec,
                "finalScores": window._resultScores,
                "interestScores": window._ni,
                "abilityScores": window._na,
                "monsterImg": window._monsterImgPath,
                "careerPath": {
                    [top1]: CAREER_MAP[top1],
                    [top2]: CAREER_MAP[top2],
                    [top3]: CAREER_MAP[top3]
                },
                "subjectWeights": {
                    [top1]: SUBJECT_WEIGHTS[top1],
                    [top2]: SUBJECT_WEIGHTS[top2],
                    [top3]: SUBJECT_WEIGHTS[top3]
                },
                "rawResponses": {
                    "abilities": S.abilities,
                    "scenariosBest": S.scenariosBest,
                    "scenariosWorst": S.scenariosWorst
                },
                "source": "monster_rpg"
            };

            console.log("Sending Report Payload:", reportPayload);
            fetch(GOOGLE_APP_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "text/plain" },
                body: JSON.stringify(reportPayload)
            }).then(() => {
                showToast('✅ 完整分析報告已寄至您的信箱，請查收！');
                btn.textContent = '確認送出';
                btn.style.opacity = 1;
            }).catch(() => {
                showToast('⚠️ 報告寄送異常，但資料已成功備份');
                btn.textContent = '確認送出';
                btn.style.opacity = 1;
            });
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }
    </script>
