<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>職群怪物圖鑑｜你內心的是哪一隻怪物？</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* ── Reset & Constants ── */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        body {
            background: #050508;
            color: #e2e8f0;
            font-family: 'Noto Sans TC', sans-serif;
            overflow-x: hidden;
            overflow-y: auto;
            /* Allow scroll if needed on main body for result */
        }

        button {
            outline: none;
            border: none;
            background: transparent;
            font-family: inherit;
        }

        /* ── Container (Mobile First, no scroll) ── */
        .app-container {
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            max-width: 480px;
            margin: 0 auto;
            background: radial-gradient(circle at 50% 30%, #1a1625 0%, #050508 80%);
            position: relative;
            overflow-x: hidden;
            overflow-y: auto;
        }

        /* ── Screen Management ── */
        .screen {
            position: absolute;
            inset: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            height: 100%;
            animation: fadeIn 0.4s ease;
        }

        .screen.active {
            display: flex;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeOut {
            from {
                opacity: 1;
                transform: translateY(0);
            }

            to {
                opacity: 0;
                transform: translateY(-10px);
            }
        }

        /* ── Home Screen ── */
        #screen-home {
            justify-content: flex-start;
            background: #000;
            padding: 1.5rem 0;
        }

        .hero-img {
            width: 100%;
            flex: 1;
            min-height: 0;
            object-fit: contain;
            opacity: 0.9;
        }

        .hero-cta {
            position: relative;
            margin-top: 1rem;
            margin-bottom: 2rem;
            flex-shrink: 0;
            background: linear-gradient(135deg, #a855f7, #6b21a8);
            color: #fff;
            font-weight: 900;
            font-size: 1.2rem;
            padding: 1rem 2.5rem;
            border-radius: 50px;
            box-shadow: 0 0 30px rgba(168, 85, 247, 0.5);
            animation: pulse 2s infinite;
            cursor: pointer;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }

            100% {
                transform: scale(1);
            }
        }

        /* ── Core Game Header ── */
        .header {
            width: 100%;
            padding: 1rem 1.5rem;
            z-index: 10;
        }

        .progress-wrap {
            position: relative;
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #c084fc, #a855f7);
            width: 0%;
            transition: width 0.3s ease;
        }

        .progress-text {
            text-align: center;
            font-size: 0.75rem;
            color: #a1a1aa;
            margin-top: 0.5rem;
            font-weight: 700;
            letter-spacing: 2px;
        }

        /* ── Egg Area ── */
        .egg-area {
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 100%;
            min-height: 120px;
            padding: 1rem 0;
        }

        .egg-container {
            position: relative;
            width: 35%;
            /* slightly narrower */
            max-width: 180px;
            aspect-ratio: 1/1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .egg-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 0 20px rgba(168, 85, 247, 0.4));
            transition: filter 0.3s, transform 0.1s;
            pointer-events: none;
        }

        .egg-svg-cracks {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .egg-svg-cracks path {
            fill: none;
            stroke: #1a1a1a;
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
            filter: drop-shadow(0 0 4px #000000);
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            transition: stroke-dashoffset 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Shake Animation */
        .shake {
            animation: shakeAnim 0.3s cubic-bezier(.36, .07, .19, .97) both;
        }

        @keyframes shakeAnim {

            10%,
            90% {
                transform: translate3d(-2px, 2px, 0) rotate(1deg);
            }

            20%,
            80% {
                transform: translate3d(2px, -3px, 0) rotate(-1deg);
            }

            30%,
            50%,
            70% {
                transform: translate3d(-4px, 4px, 0) rotate(2deg);
                filter: brightness(1.2) drop-shadow(0 0 40px rgba(168, 85, 247, 0.8));
            }

            40%,
            60% {
                transform: translate3d(4px, -4px, 0) rotate(-2deg);
            }
        }

        /* Particles */
        .debris {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #ffd700;
            border-radius: 50%;
            pointer-events: none;
            z-index: 50;
            box-shadow: 0 0 12px #ffaa00;
        }

        /* ── Panel / Question Area ── */
        .panel {
            background: rgba(255, 255, 255, 0.05);
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
            padding: 1.5rem;
            padding-bottom: env(safe-area-inset-bottom, 1.5rem);
            display: flex;
            flex-direction: column;
            min-height: 45vh;
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .q-title {
            font-size: 1.15rem;
            font-weight: 900;
            margin-bottom: 0.3rem;
            color: #fff;
            line-height: 1.4;
        }

        .q-desc {
            font-size: 1.05rem;
            color: #a1a1aa;
            margin-bottom: 1rem;
            line-height: 1.4;
        }

        .q-opts {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            overflow-y: auto;
            overflow-x: hidden;
            flex: 1;
        }

        .q-opts.grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-auto-rows: min-content;
        }

        .opt-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(255, 255, 255, 0.1);
            color: #e2e8f0;
            border-radius: 12px;
            padding: 1rem;
            font-size: 0.95rem;
            font-weight: 700;
            text-align: center;
            justify-content: center;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s;
            line-height: 1.3;
            flex-wrap: wrap;
            min-height: 3.5rem;
        }

        .opt-btn:active {
            transform: scale(0.97);
            background: rgba(255, 255, 255, 0.15);
        }

        .opt-btn.sel {
            border-color: #a855f7;
            background: rgba(168, 85, 247, 0.15);
        }

        .opt-btn.sel-best {
            border-color: #34d399;
            background: rgba(52, 211, 153, 0.15);
        }

        .opt-btn.sel-worst {
            border-color: #f87171;
            background: rgba(248, 113, 113, 0.15);
        }

        .opt-btn.disabled {
            opacity: 0.4;
            pointer-events: none;
        }

        .scenario-badge {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2px solid #52525b;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 900;
            color: #52525b;
            flex-shrink: 0;
        }

        .opt-btn.sel-best .scenario-badge {
            border-color: #34d399;
            background: #34d399;
            color: #000;
        }

        .opt-btn.sel-worst .scenario-badge {
            border-color: #f87171;
            background: #f87171;
            color: #000;
        }

        /* ── Result Screen ── */
        #screen-result {
            background: #000;
            justify-content: flex-start;
            padding-bottom: 3rem;
        }

        .monster-img-wrap {
            width: 100%;
            padding: 1.5rem;
            display: flex;
            justify-content: center;
        }

        .monster-img {
            width: 100%;
            max-width: 320px;
            height: auto;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(168, 85, 247, 0.4);
        }

        .result-ui {
            position: relative;
            display: flex;
            flex-direction: column;
            padding: 0 1.5rem;
        }

        .result-actions {
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin-bottom: env(safe-area-inset-bottom, 1rem);
        }

        .btn-share,
        .btn-email {
            width: 100%;
            padding: 1.1rem;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 900;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-share {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: white;
        }

        .btn-email {
            background: linear-gradient(135deg, #a855f7, #6b21a8);
            color: white;
            border: none;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.5);
        }

        .btn-share:active,
        .btn-email:active {
            transform: scale(0.97);
        }

        /* Email Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
            z-index: 100;
            display: none;
            align-items: flex-end;
        }

        .modal-overlay.active {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        .modal-content {
            background: #18181b;
            width: 100%;
            padding: 2rem 1.5rem;
            border-top-left-radius: 24px;
            border-top-right-radius: 24px;
            padding-bottom: max(2rem, env(safe-area-inset-bottom));
        }

        .modal-title {
            font-size: 1.1rem;
            font-weight: 900;
            margin-bottom: 0.5rem;
            color: #fff;
        }

        .modal-desc {
            font-size: 0.85rem;
            color: #a1a1aa;
            margin-bottom: 1.5rem;
            line-height: 1.5;
        }

        .email-input {
            width: 100%;
            background: #27272a;
            border: 1px solid #3f3f46;
            border-radius: 12px;
            padding: 1rem;
            color: #fff;
            font-size: 1rem;
            outline: none;
            margin-bottom: 1rem;
            font-family: inherit;
        }

        .email-input:focus {
            border-color: #a855f7;
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-50px);
            background: #fff;
            color: #000;
            padding: 0.8rem 1.5rem;
            border-radius: 50px;
            font-weight: 800;
            font-size: 0.9rem;
            z-index: 1000;
            transition: transform 0.3s;
            pointer-events: none;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>

<body>

    <div class="toast" id="toast"></div>

    <!-- ================= AUDIO ================= -->
    <audio id="bgm" src="background.mp3" loop></audio>

    <!-- ================= INTRO ================= -->

        <button class="hero-cta" onclick="startGame()">覺醒內在怪物!!</button>

    <!-- ================= GAME LOOP ================= -->

                o.type = 'triangle'; g.connect(ac.destination); o.connect(g);
                o.frequency.setValueAtTime(400, ac.currentTime);
                o.frequency.exponentialRampToValueAtTime(100, ac.currentTime + 0.1);
                g.gain.setValueAtTime(0.3, ac.currentTime);
                g.gain.exponentialRampToValueAtTime(0.01, ac.currentTime + 0.1);
                o.start(); o.stop(ac.currentTime + 0.1);
            } catch (e) { }
        }
        function sfxCrack() {
            try {
                if (!ac) return;
                const o = ac.createOscillator(), g = ac.createGain();
                o.type = 'square'; g.connect(ac.destination); o.connect(g);
                o.frequency.setValueAtTime(100, ac.currentTime);
                o.frequency.linearRampToValueAtTime(50, ac.currentTime + 0.2);
                g.gain.setValueAtTime(0.4, ac.currentTime);
                g.gain.exponentialRampToValueAtTime(0.01, ac.currentTime + 0.2);

                // noise

                for (let i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / n);
                const s = ac.createBufferSource(); s.buffer = b;
                const f = ac.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = 1000;
                s.connect(f); f.connect(g); s.start();
                o.start(); o.stop(ac.currentTime + 0.2);
            } catch (e) { }
        }

                o.frequency.setValueAtTime(300, ac.currentTime);
                o.frequency.exponentialRampToValueAtTime(1500, ac.currentTime + 1.2);
                g.gain.setValueAtTime(0.5, ac.currentTime);
                g.gain.exponentialRampToValueAtTime(0.01, ac.currentTime + 1.5);
                o.start(); o.stop(ac.currentTime + 1.5);
            } catch (e) { }
        }


        /* ─── VISUAL FX ─── */
        function spawnParticles(amount) {
            const egg = document.getElementById('eggContainer');
            const rect = egg.getBoundingClientRect();
            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2;

            for (let i = 0; i < amount; i++) {
                const p = document.createElement('div');
                p.className = 'debris';
                p.style.left = cx + 'px';
                p.style.top = cy + 'px';
                document.body.appendChild(p);

                const angle = Math.random() * Math.PI * 2;
                const speed = 40 + Math.random() * 80;
                const tx = Math.cos(angle) * speed;
                const ty = Math.sin(angle) * speed - 50; // gravity bias
                const rot = (Math.random() - 0.5) * 720;

                requestAnimationFrame(() => {
                    p.style.transition = 'all 0.6s cubic-bezier(0.2, 1, 0.3, 1)';
                    p.style.transform = `translate(${tx}px, ${ty}px) rotate(${rot}deg) scale(0)`;
                    p.style.opacity = '0';
                });
                setTimeout(() => p.remove(), 600);
            }
        }
        function shakeEgg() {
            const area = document.getElementById('eggContainer');

            area.classList.add('shake');
        }
        function buildEggCracks() {
            const svg = document.getElementById('eggCracks');
            svg.innerHTML = '';
            // Generate 15 jagged lines radiating from center
            for (let i = 0; i < 15; i++) {
                let x = 100, y = 100;
                const angle = (i / 15) * Math.PI * 2;
                let d = `M ${x} ${y}`;
                let len = 0;
                while (len < 80) {
                    const step = 8 + Math.random() * 15;
                    x += Math.cos(angle + (Math.random() - 0.5) * 0.8) * step;
                    y += Math.sin(angle + (Math.random() - 0.5) * 0.8) * step;
                    d += ` L ${x} ${y}`;
                    len += step;
                }
                const p = document.createElementNS("http://www.w3.org/2000/svg", "path");
                p.setAttribute('d', d);
                // Random stroke length for each crack
                const dash = 50 + Math.random() * 50;
                p.setAttribute('stroke-dasharray', dash);
                p.setAttribute('stroke-dashoffset', dash);
                p.style.opacity = 0.8;
                svg.appendChild(p);
            }
        }
        function updateEggCracksVisual(pct) {
            const svg = document.getElementById('eggCracks');
            const paths = Array.from(svg.children);
            const visibleCount = Math.floor((pct / 100) * paths.length);
            paths.forEach((p, i) => {
                if (i < visibleCount) {
                    p.style.strokeDashoffset = "0"; // reveal

            });
        }

            S.curScenarioBest = null;

            if (q.type !== 'ability') {
                box.classList.add('grid-2');
            } else {
                box.classList.remove('grid-2');
            }

            q.opts.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'opt-btn';

                if (q.type === 'scenario') {
                    btn.innerHTML = `<div class="scenario-badge">?</div> <div>${opt.t}</div>`;
                    btn.onclick = () => handleScenarioClick(q, opt, btn, box);
                } else if (q.type === 'multi') {
                    btn.textContent = opt.t;
                    btn.onclick = () => handleMultiClick(q, opt, btn, box);
                } else {
                    btn.textContent = opt.t;
                    btn.onclick = () => handleSingleClick(q, opt.v, btn);
                }
                box.appendChild(btn);
            });
        }

        // Handler: Single Choice (Grade, Clarity, Values2, Abilities)
        function handleSingleClick(q, val, btn) {
            btn.classList.add('sel');
            processHit();

            // Save state
            if (q.type === 'ability') S.abilities[q.ab.id] = val;
            else S.answers[q.key] = val;

            // Advance
            setTimeout(() => { S.qIdx++; renderQuestion(); }, 200);
        }

        // Handler: Multi Choice (Values Q1)
        function handleMultiClick(q, opt, btn, box) {
            const max = q.max;
            if (btn.classList.contains('sel')) {
                // Deselect
                btn.classList.remove('sel');
                S.curMultiSelection = S.curMultiSelection.filter(v => v !== opt.v);
                sfxHit();
            } else {
                if (S.curMultiSelection.length >= max) return; // limit reached
                btn.classList.add('sel');
                S.curMultiSelection.push(opt.v);
                processHit();

                if (S.curMultiSelection.length === max) {
                    // Save and advance
                    S.answers[q.key] = [...S.curMultiSelection];
                    // Disable other buttons instantly
                    Array.from(box.children).forEach(b => { if (!b.classList.contains('sel')) b.classList.add('disabled'); });
                    setTimeout(() => { S.qIdx++; renderQuestion(); }, 350);
                }
            }
        }

        // Handler: Scenario (Best/Worst sequence)
        function handleScenarioClick(q, opt, btn, box) {
            if (S.curScenarioBest === null) {
                // 1st click = BEST
                S.curScenarioBest = opt.oIdx;
                btn.classList.add('sel-best');
                btn.querySelector('.scenario-badge').textContent = '👍';
                document.getElementById('qDesc').innerHTML = '🎯 已選擇最想做。 <br><span style="color:#f87171">👇 現在請選擇1個「絕對不想做」的地雷</span>';
                processHit();
            } else {
                // 2nd click = WORST
                if (opt.oIdx === S.curScenarioBest) {
                    // Undoing best
                    S.curScenarioBest = null;
                    btn.classList.remove('sel-best');
                    btn.querySelector('.scenario-badge').textContent = '?';
                    document.getElementById('qDesc').innerHTML = q.desc.replace('\n', '<br>');
                    sfxHit();
                    return;
                }

                btn.classList.add('sel-worst');
                btn.querySelector('.scenario-badge').textContent = '👎';
                processHit();

                // Save and advance
                S.scenariosBest[q.qNum] = S.curScenarioBest;
                S.scenariosWorst[q.qNum] = opt.oIdx;

                Array.from(box.children).forEach(b => { if (!b.classList.contains('sel-best') && !b.classList.contains('sel-worst')) b.classList.add('disabled'); });

                setTimeout(() => { S.qIdx++; renderQuestion(); }, 350);
            }
        }


        /* ─── SCORING & END ─── */
        function calcAndEnd() {
            processHit(); // Final shatter hit
            sfxReveal(); // Grand reveal!
            document.getElementById('progFill').style.width = '100%';
            document.getElementById('progText').textContent = `覺醒完成 100%`;
            updateEggCracksVisual(100);

            // BIG EXPLOSION
            const egg = document.getElementById('eggImg');
            egg.style.transform = 'scale(1.5)';
            egg.style.filter = 'brightness(2)';
            for (let i = 0; i < 3; i++) setTimeout(() => spawnParticles(Math.random() * 10 + 10), i * 100);

            setTimeout(() => {
                // Compute Scores
                const interest = {}, ability = {}, values = {};
                GROUPS.forEach(g => { interest[g] = 0; ability[g] = 0; values[g] = 0; });

                // Scenarios mapped to Interest
                RAW_SCENARIOS.forEach((sc, idx) => {
                    const qNum = idx + 1;
                    const b = S.scenariosBest[qNum];
                    const w = S.scenariosWorst[qNum];
                    sc.o.forEach((opt, oi) => {
                        if (oi === b) interest[opt.g] += 5;
                        else if (oi === w) interest[opt.g] -= 5;
                        else interest[opt.g] += 1;
                    });
                });

                // Abilities
                RAW_ABILITIES.forEach(ab => {
                    const val = S.abilities[ab.id];
                    const pts = val === 'good' ? 3 : val === 'avg' ? 1 : 0;
                    ab.g.forEach(g => ability[g] += pts);
                    if (val === 'weak') ab.g.forEach(g => ability[g] -= 2);
                });

                // Values
                const v1 = S.answers['val1'] || [];
                v1.forEach(vk => { if (VALUES_MAP[vk]) VALUES_MAP[vk].groups.forEach(g => values[g] += 2); });
                const v2 = S.answers['val2'];
                if (v2 && VALUES_MAP[v2]) VALUES_MAP[v2].groups.forEach(g => values[g] += 5);

                // Normalize 0-100
                const norm = (obj) => {
                    const v = Object.values(obj), mn = Math.min(...v), mx = Math.max(...v), rng = mx - mn || 1;
                    const res = {};
                    GROUPS.forEach(g => res[g] = Math.round((obj[g] - mn) / rng * 100));
                    return res;
                };
                const ni = norm(interest), na = norm(ability), nv = norm(values);

                // Final Weight: 50% Interest, 30% Ability, 20% Values
                const final = {};
                GROUPS.forEach(g => {
                    final[g] = Math.round(ni[g] * 0.5 + na[g] * 0.3 + nv[g] * 0.2);
                });

                // Find Top 1
                const top1 = Object.entries(final).sort((a, b) => b[1] - a[1])[0][0];
                window._resultScores = final;
                window._topName = top1;
                window._monsterImgPath = MONSTERS[top1] || MONSTERS['資訊學群'];

                // Show Result
                document.getElementById('resMonsterImg').src = window._monsterImgPath;
                document.getElementById('screen-game').classList.remove('active');
                document.getElementById('screen-result').classList.add('active');

            }, 1000);
        }

        /* ─── RESULT ACTIONS ─── */
        function shareIG() {
            sfxHit();
            // Use Web Share API if mobile
            if (navigator.share) {
                navigator.share({
                    title: '職群怪物圖鑑',
                    text: `我覺醒的變異體質是「${window._topName}」，推薦你也來測測看！`,
                    url: window.location.href // Change to your public URL if available
                }).catch(e => {
                    showToast('截圖分享到 IG 吧！');
                });
            } else {
                showToast('請使用手機長按圖片儲存，再發布到 IG ！');
            }
        }

        function openEmail() {
            sfxHit();
            document.getElementById('emailModal').classList.add('active');
        }

        function submitEmail() {
            const em = document.getElementById('emailInput').value.trim();
            if (!em || !em.includes('@')) {
                showToast('⚠️ 請輸入正確的信箱');
                return;
            }
            sfxHit();
            const btn = document.getElementById('btnSendEmail');
            btn.textContent = '寄送中...';
            btn.style.opacity = 0.5;

            // Fire to GAS
            fetch("https://script.google.com/macros/s/AKfycbwC9UTPJRnWCn0ouPPJr958wL2vV9RIUdxL51lyedU40gaSUZkXxA6EWZZPik8kt_BG/exec", {
                method: "POST", mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    email: em, topGroup: window._topName, scores: window._resultScores,
                    raw: S
                })
            }).then(() => {
                showToast('✅ 備份報告已寄出，請查收信箱');
                document.getElementById('emailModal').classList.remove('active');
                btn.textContent = '確認送出';
                btn.style.opacity = 1;
            }).catch(() => {
                showToast('✅ 已成功記錄寄送請求');
                document.getElementById('emailModal').classList.remove('active');
                btn.textContent = '確認送出';
                btn.style.opacity = 1;
            });
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }
    </script>
