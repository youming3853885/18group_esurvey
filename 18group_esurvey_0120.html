    <style>
        body { font-family: "Microsoft JhengHei", Arial, sans-serif; background-color: #f3f4f6; }
        .question-card { transition: all 0.3s ease; }
        .question-card:hover { box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05); }
        
        /* 自定義 Radio Button 樣式 */
        .radio-group { display: flex; justify-content: space-between; width: 100%; max-width: 300px; margin: 0 auto; }
        .radio-label { 
            cursor: pointer; display: flex; flex-direction: column; align-items: center; 
            font-size: 0.75rem; color: #6b7280; position: relative;
        }
        .radio-input { appearance: none; width: 20px; height: 20px; border: 2px solid #d1d5db; border-radius: 50%; outline: none; transition: all 0.2s; margin-bottom: 4px; }
        .radio-input:checked { border-color: #2563eb; background-color: #2563eb; transform: scale(1.2); }
        .radio-input:hover { border-color: #60a5fa; }
        
        /* 選項區塊樣式 */
        .option-row { 
            display: flex; flex-direction: column; 
            padding: 1rem 0; border-bottom: 1px solid #e5e7eb; 
        }
        .option-text { margin-bottom: 0.5rem; font-weight: 500; color: #374151; }
        
        @media (min-width: 768px) {
            .option-row { flex-direction: row; align-items: center; justify-content: space-between; }
            .option-text { flex: 1; margin-bottom: 0; margin-right: 1rem; }
            .radio-group { margin: 0; }
        }

        .result { display: none; }
        .loading { display: none; text-align: center; font-size: 1.2rem; color: #2563eb; }
    </style>

            </div>

        function calculateAndShowResults() {
            const scores = {};
            groups.forEach(g => scores[g] = 0);

            // 遍歷所有 Radio inputs
            const inputs = document.querySelectorAll('input[type="radio"]:checked');
            
            inputs.forEach(input => {
                // name 格式: q1_o0_資訊學群 (如果是計分題)
                // name 格式: self_score (如果是自評題，忽略)
                const parts = input.name.split('_');
                if (parts.length >= 3) {
                    const group = parts[2];
                    const points = parseInt(input.value);
                    if (scores.hasOwnProperty(group)) {
                        scores[group] += points;
                    }
                }
            });

            // 排序與選出前三名
            const sortedGroups = Object.entries(scores)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 3);

            // 產生結果 HTML
            let topGroupsHtml = '<h3 class="text-xl font-bold mb-3 text-blue-800">🏆 你的命定學群 TOP 3</h3><ul class="space-y-2">';

            let subjectHtml = '<h3 class="text-xl font-bold mb-4 border-b pb-2">📚 推薦學群參採科目比重參考</h3>';
            
            subjectHtml += '<div class="grid md:grid-cols-3 gap-4">';

            sortedGroups.forEach(([group, score], index) => {
                const rankIcons = ['🥇', '🥈', '🥉'];
                const career = careerSuggestionsMap[group] || '';
                
                // Top Groups

                // Career

                    careerHtml += `
                        <li class="bg-white p-3 rounded shadow-sm border-l-4 border-green-500">
                            <div class="font-bold text-gray-800">${group}</div>
                            <div class="text-sm text-gray-600">${career}</div>
                        </li>`;
                }

                // Subject Weights
                const w = subjectWeights[group];
                if (w) {
                    subjectHtml += `
                        <div class="bg-gray-50 p-4 rounded border">
                            <h4 class="font-bold text-center mb-2 text-blue-700">${group}</h4>
                            <div class="flex justify-between text-sm border-b pb-1 mb-1"><span>科目</span><span>參採率</span></div>
                            ${Object.keys(w).map(sub => `
                                <div class="flex justify-between text-sm ${w[sub] > 50 ? 'font-bold text-red-600' : 'text-gray-600'}">
                                    <span>${sub}</span><span>${w[sub]}%</span>
                                </div>
                            `).join('')}
                        </div>
                    `;
                }
            });

            topGroupsHtml += '</ul>';
            careerHtml += '</ul>';
            subjectHtml += '</div><p class="text-xs text-gray-500 mt-2">*參採率：代表該學群下有多少比例的科系會看這個科目的成績。</p>';

            document.getElementById('topGroups').innerHTML = topGroupsHtml;
            document.getElementById('careerSuggestions').innerHTML = careerHtml;
            document.getElementById('subjectWeights').innerHTML = subjectHtml;

                        borderColor: 'rgba(37, 99, 235, 1)',

                        borderWidth: 2

                            }
                        }
                    },
                    maintainAspectRatio: false
                }
            });

            document.getElementById('result').style.display = 'block';
